name: Deploy to AWS

on:
  push:
    branches:
      - main

# 必要な GitHub Secrets:
#   ADMIN_USER_ID - LINE の管理者ユーザーID
#
# AWS 認証は OIDC で行う（IAM キー不要）
# 事前に以下を手動作成すること:
#   1. IAM OIDC Identity Provider: token.actions.githubusercontent.com
#   2. IAM Role: github-actions-family-schedule-kame（リポジトリの trust policy を付与）

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: family-schedule-web-kame-982312822872

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (esbuild)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::982312822872:role/github-actions-family-schedule-kame
          aws-region: ${{ env.AWS_REGION }}

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Deploy with SAM
        run: |
          sam deploy \
            --config-file samconfig.toml \
            --parameter-overrides \
              "LineSecretName=line/credentials-kame" \
              "AdminUserId=${{ secrets.ADMIN_USER_ID }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      # Web ファイルを S3 に同期
      - name: Sync web assets to S3
        run: |
          aws s3 sync web/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=86400" \
            --exclude "images/*" \
            --exclude "chirol-images/*" \
            --no-cli-pager

          # 画像は長期キャッシュ（変更があった場合のみ更新）
          aws s3 sync web/images/ s3://${{ env.S3_BUCKET }}/images/ \
            --cache-control "public, max-age=31536000, immutable" \
            --no-cli-pager

          # HTML は短期キャッシュ
          aws s3 cp web/home.html s3://${{ env.S3_BUCKET }}/home.html \
            --cache-control "public, max-age=300" \
            --content-type "text/html; charset=utf-8" \
            --no-cli-pager
          aws s3 cp web/dashboard.html s3://${{ env.S3_BUCKET }}/dashboard.html \
            --cache-control "public, max-age=300" \
            --content-type "text/html; charset=utf-8" \
            --no-cli-pager

      - name: Deploy complete
        run: echo "Deploy complete. Lambda functions and S3 assets updated."
