name: Deploy to AWS

on:
  push:
    branches:
      - main

# AWS 認証は OIDC（IAM キー不要）
# IAM Role: github-actions-family-schedule-kame
# 旧 AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY は GitHub Secrets から削除してください

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: family-schedule-web-kame-982312822872

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (esbuild)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::982312822872:role/github-actions-family-schedule-kame
          aws-region: ${{ env.AWS_REGION }}

      # Lambda 関数を個別に更新（ZIP → update-function-code）
      - name: Package & Deploy Lambda functions
        run: |
          set -e
          mkdir -p /tmp/lambda-zips

          FUNCTIONS=(
            "family-schedule-webhook-kame:handlers/webhook.js"
            "family-schedule-submit-kame:handlers/schedule-submit.js"
            "family-schedule-get-kame:handlers/schedule-get.js"
            "family-schedule-week-get-kame:handlers/schedule-week-get.js"
            "family-schedule-weekly-reminder-kame:handlers/weekly-reminder.js"
            "chirol-hitokoto-kame:handlers/chirol-hitokoto.js"
            "chirol-image-kame:handlers/chirol-image.js"
            "post-get-kame:handlers/post-get.js"
            "post-save-kame:handlers/post-save.js"
            "wannade-save-kame:handlers/wannade-save.js"
            "account-kame:handlers/account.js"
          )

          for entry in "${FUNCTIONS[@]}"; do
            FUNC_NAME="${entry%%:*}"
            HANDLER_FILE="${entry##*:}"
            ZIP_PATH="/tmp/lambda-zips/${FUNC_NAME}.zip"

            (cd dist && zip "$ZIP_PATH" "${HANDLER_FILE}")

            echo "Deploying ${FUNC_NAME}..."
            aws lambda update-function-code \
              --function-name "$FUNC_NAME" \
              --zip-file "fileb://${ZIP_PATH}" \
              --no-cli-pager \
              --output text
          done

      # git hash を各所に注入（キャッシュバスト）
      - name: Inject git hash for cache busting
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          # sw.js の CACHE_VERSION を更新（最重要: ブラウザが sw.js の変化を検知して古いキャッシュを削除する）
          sed -i "s/const CACHE_VERSION = '[^']*'/const CACHE_VERSION = '${GIT_HASH}'/g" web/sw.js
          # HTML の APP_SW_VERSION とバンドル参照を更新（バックアップ機構）
          for f in web/home.html web/dashboard.html; do
            sed -i "s/var APP_SW_VERSION = '[^']*'/var APP_SW_VERSION = '${GIT_HASH}'/g" "$f"
            sed -i "s|\.bundle\.js[^\"']*|.bundle.js?v=${GIT_HASH}|g" "$f"
            sed -i "s|\.bundle\.css[^\"']*|.bundle.css?v=${GIT_HASH}|g" "$f"
          done
          echo "Cache bust → ${GIT_HASH}"

      # Web ファイルを S3 に同期
      - name: Sync web assets to S3
        run: |
          aws s3 sync web/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "no-cache" \
            --exclude "images/*" \
            --exclude "chirol-images/*" \
            --no-cli-pager

          # 画像は長期キャッシュ（変更があった場合のみ更新）
          aws s3 sync web/images/ s3://${{ env.S3_BUCKET }}/images/ \
            --cache-control "public, max-age=31536000, immutable" \
            --no-cli-pager

          # HTML は常に最新を返す（no-cache = 毎回サーバー確認、SW版バージョン検知のため）
          aws s3 cp web/home.html s3://${{ env.S3_BUCKET }}/home.html \
            --cache-control "no-cache" \
            --content-type "text/html; charset=utf-8" \
            --no-cli-pager
          aws s3 cp web/dashboard.html s3://${{ env.S3_BUCKET }}/dashboard.html \
            --cache-control "no-cache" \
            --content-type "text/html; charset=utf-8" \
            --no-cli-pager

      - name: Deploy complete
        run: echo "Deploy complete. Lambda functions and S3 assets updated."
