<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>部屋v2</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0f0f0f;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  min-height: 100vh;
  padding: 24px 16px 40px;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}

h2 { color: #fff; font-size: 15px; margin-bottom: 4px; text-align: center; font-weight: 500; letter-spacing: 0.5px; }
.sub { color: #666; font-size: 12px; margin-bottom: 20px; text-align: center; }

/* Phone */
.phone {
  width: 300px;
  background: #111;
  border-radius: 44px;
  padding: 10px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px #222;
}
.screen {
  border-radius: 34px;
  overflow: hidden;
  background: #1a0e00;
  position: relative;
}

/* Room scene */
.room {
  position: relative;
  height: 430px;
  overflow: hidden;
}

/* Sky gradient through window */
.room-bg {
  position: absolute;
  inset: 0;
  /* Warm evening room */
  background: linear-gradient(180deg,
    #2c1a0e 0%,
    #3d2410 60%,
    #5c3820 100%
  );
}

/* Ambient light from window */
.window-light {
  position: absolute;
  top: -20px; left: 10px;
  width: 140px; height: 200px;
  background: radial-gradient(ellipse at 40% 10%, rgba(255,200,100,0.12) 0%, transparent 70%);
  pointer-events: none;
}

/* Wall texture - subtle */
.wall {
  position: absolute;
  inset: 0;
  bottom: 160px;
  background: linear-gradient(180deg, #3a2211 0%, #4a2e18 100%);
}
.wall::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 60px),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 60px);
}

/* Floor */
.floor {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 165px;
  background: linear-gradient(170deg, #7a4f2a 0%, #5c3820 100%);
}
.floor::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    0deg, transparent, transparent 26px,
    rgba(0,0,0,0.12) 26px, rgba(0,0,0,0.12) 27px
  );
}

/* Baseboard */
.baseboard {
  position: absolute;
  bottom: 163px; left: 0; right: 0;
  height: 5px;
  background: linear-gradient(180deg, #2a1505, #1a0d03);
  z-index: 2;
}

/* ===== Window ===== */
.window {
  position: absolute;
  top: 18px; left: 16px;
  width: 68px; height: 86px;
  background: linear-gradient(170deg, #1a2744 0%, #0d1b35 50%, #192a4a 100%);
  border: 3px solid #5c3820;
  border-radius: 3px;
  box-shadow: inset 0 0 12px rgba(80,120,200,0.2), 2px 3px 10px rgba(0,0,0,0.4);
  overflow: hidden;
  z-index: 3;
}
.window-stars {
  position: absolute; inset: 0;
  font-size: 7px;
  color: rgba(255,255,255,0.8);
  display: flex; flex-wrap: wrap;
  gap: 6px; padding: 4px;
  line-height: 1;
}
.window-cross-h {
  position: absolute; top: 50%; left: 0; right: 0;
  height: 3px; background: #4a2e18; transform: translateY(-50%);
}
.window-cross-v {
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 3px; background: #4a2e18; transform: translateX(-50%);
}
.window-glow {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(100,150,255,0.08), transparent);
}
.moon {
  position: absolute; top: 6px; right: 8px;
  font-size: 14px;
  animation: moonrise 6s ease-in-out infinite;
}
@keyframes moonrise { 0%,100%{opacity:0.7; transform:translateY(0)} 50%{opacity:1; transform:translateY(-2px)} }

/* ===== LAMP ===== */
.lamp {
  position: absolute;
  top: 0; right: 50px;
  z-index: 4;
}
.lamp-arm {
  width: 3px; height: 36px;
  background: linear-gradient(180deg, #6b4c2a, #8b6340);
  margin-left: 20px;
}
.lamp-head {
  width: 44px; height: 22px;
  background: linear-gradient(180deg, #c8a060 0%, #e8c070 100%);
  border-radius: 22px 22px 0 0;
  position: relative;
  margin-left: 0;
  box-shadow: 0 4px 20px rgba(255,200,80,0.3);
}
.lamp-light {
  position: absolute;
  top: 22px; left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 60px solid transparent;
  border-right: 60px solid transparent;
  border-top: 80px solid rgba(255,210,80,0.06);
  pointer-events: none;
}

/* ===== CALENDAR (wall) ===== */
.obj-calendar {
  position: absolute;
  top: 16px; right: 14px;
  width: 60px; height: 70px;
  background: #fafaf8;
  border-radius: 4px;
  box-shadow: 2px 3px 12px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.1);
  cursor: pointer;
  z-index: 4;
  overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
}
.obj-calendar:active { transform: scale(0.94); }
.cal-top {
  background: #c0392b;
  height: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #fff;
  letter-spacing: 0.5px;
}
.cal-holes {
  position: absolute;
  top: -3px; left: 0; right: 0;
  display: flex; justify-content: space-evenly;
}
.cal-hole {
  width: 6px; height: 6px;
  background: #1a0d03;
  border-radius: 50%;
}
.cal-grid {
  padding: 3px 2px;
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 1px;
}
.cg { font-size: 6px; text-align: center; color: #888; }
.cg.h { color: #c0392b; font-weight: 600; }
.cg.s { color: #3498db; }
.cg.n { color: #333; }
.cg.today {
  background: #c0392b; color: #fff;
  border-radius: 50%;
  width: 8px; height: 8px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto;
}
.obj-calendar .badge {
  position: absolute;
  bottom: -26px; left: 50%; transform: translateX(-50%);
  background: rgba(192,57,43,0.9);
  color: #fff; font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 8px;
  white-space: nowrap;
}

/* ===== PHOTO FRAME (wall center) ===== */
.obj-photo {
  position: absolute;
  top: 22px; left: 50%; transform: translateX(-50%);
  width: 74px; height: 68px;
  cursor: pointer;
  z-index: 4;
  transition: transform 0.15s;
}
.obj-photo:active { transform: translateX(-50%) scale(0.94); }
.frame-outer {
  width: 100%; height: 100%;
  background: linear-gradient(145deg, #a07840, #7a5820, #c09050, #8a6030);
  border-radius: 3px;
  padding: 5px;
  box-shadow: 2px 3px 12px rgba(0,0,0,0.5);
}
.frame-inner {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #ffd89b 0%, #fdcb82 30%, #e8b060 70%, #d4954a 100%);
  border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  overflow: hidden;
  position: relative;
}
.frame-inner::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
}
.obj-photo .badge {
  position: absolute;
  bottom: -26px; left: 50%; transform: translateX(-50%);
  background: rgba(180,100,30,0.9);
  color: #fff; font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 8px;
  white-space: nowrap;
}

/* ===== SHELF + BOOKS ===== */
.obj-shelf {
  position: absolute;
  bottom: 190px; left: 10px;
  width: 82px;
  cursor: pointer;
  z-index: 4;
  transition: transform 0.15s;
}
.obj-shelf:active { transform: scale(0.95); }
.books-row {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  padding: 0 4px 0;
}
.bk {
  border-radius: 2px 2px 0 0;
  position: relative;
  flex-shrink: 0;
}
.bk::after {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 2px; height: 100%;
  background: rgba(0,0,0,0.15);
}
.bk1 { width:9px; height:38px; background:linear-gradient(180deg,#e74c3c,#c0392b); }
.bk2 { width:7px; height:28px; background:linear-gradient(180deg,#3498db,#2980b9); }
.bk3 {
  width:13px; height:44px;
  background:linear-gradient(180deg,#f39c12,#e67e22);
  display:flex; align-items:center; justify-content:center;
}
.bk3 span {
  writing-mode: vertical-rl;
  font-size: 6px;
  color: #fff;
  font-weight: 700;
  letter-spacing: 1px;
}
.bk4 { width:8px; height:32px; background:linear-gradient(180deg,#2ecc71,#27ae60); }
.bk5 { width:9px; height:36px; background:linear-gradient(180deg,#9b59b6,#8e44ad); }
.bk6 { width:7px; height:24px; background:linear-gradient(180deg,#e8d5a0,#d4b870); }
.shelf-board {
  height: 7px;
  background: linear-gradient(180deg, #8b6340, #6b4320);
  border-radius: 2px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.4);
  margin-top: 1px;
}
.shelf-bracket-l, .shelf-bracket-r {
  position: absolute;
  bottom: 0;
  width: 5px; height: 20px;
  background: #5c3820;
}
.shelf-bracket-l { left: 6px; }
.shelf-bracket-r { right: 6px; }
.obj-shelf .badge {
  text-align: center;
  margin-top: 6px;
  background: rgba(120,60,20,0.9);
  color: #fff; font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 8px;
  display: inline-block;
  position: relative; left: 50%; transform: translateX(-50%);
  white-space: nowrap;
}

/* ===== FIRST AID BOX ===== */
.obj-firstaid {
  position: absolute;
  bottom: 188px; right: 12px;
  width: 54px; height: 46px;
  cursor: pointer;
  z-index: 4;
  transition: transform 0.15s;
}
.obj-firstaid:active { transform: scale(0.94); }
.aid-box {
  width: 100%; height: 100%;
  background: linear-gradient(145deg, #fff, #f0f0f0);
  border: 2px solid #c0392b;
  border-radius: 6px;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.4);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
}
.aid-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 8px;
  background: #c0392b;
  opacity: 0.1;
}
.cross-v {
  position: absolute;
  left: 50%; top: 8px; bottom: 8px;
  width: 8px; transform: translateX(-50%);
  background: #c0392b;
  border-radius: 2px;
}
.cross-h {
  position: absolute;
  top: 50%; left: 8px; right: 8px;
  height: 8px; transform: translateY(-50%);
  background: #c0392b;
  border-radius: 2px;
}
.aid-handle {
  position: absolute;
  top: -6px; left: 50%; transform: translateX(-50%);
  width: 20px; height: 7px;
  border: 2px solid #aaa;
  border-radius: 4px 4px 0 0;
  background: transparent;
}
.obj-firstaid .badge {
  position: absolute;
  bottom: -26px; left: 50%; transform: translateX(-50%);
  background: rgba(192,57,43,0.9);
  color: #fff; font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 8px;
  white-space: nowrap;
}

/* ===== RUG ===== */
.rug {
  position: absolute;
  bottom: 68px; left: 50%; transform: translateX(-50%);
  width: 150px; height: 50px;
  background: radial-gradient(ellipse, #8b1a1a 0%, #6b1010 60%, #4a0808 100%);
  border-radius: 50%;
  z-index: 1;
  opacity: 0.7;
}
.rug::after {
  content: '';
  position: absolute; inset: 6px;
  border-radius: 50%;
  border: 1px solid rgba(255,200,150,0.2);
}

/* ===== DOG ===== */
.dog {
  position: absolute;
  bottom: 100px; left: 50%; transform: translateX(-50%);
  z-index: 6;
  text-align: center;
  cursor: default;
}
.dog-circle {
  width: 90px; height: 90px;
  border-radius: 50%;
  background: linear-gradient(135deg, #8b6340, #6b4320);
  border: 3px solid rgba(255,255,255,0.15);
  box-shadow: 0 6px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,200,100,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 44px;
  animation: dog-breathe 4s ease-in-out infinite;
  overflow: hidden;
}
@keyframes dog-breathe {
  0%,100% { transform: scale(1) rotate(-1deg); }
  50%      { transform: scale(1.03) rotate(1deg); }
}
.dog-shadow {
  width: 70px; height: 14px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.4), transparent);
  border-radius: 50%;
  margin: 4px auto 0;
}

/* ===== SPEECH BUBBLE ===== */
.speech {
  position: absolute;
  bottom: 202px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.95);
  border-radius: 14px;
  padding: 7px 12px;
  font-size: 10px;
  color: #333;
  font-weight: 500;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  z-index: 7;
  animation: bubble-float 4s ease-in-out infinite;
}
@keyframes bubble-float {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-3px); }
}
.speech::after {
  content: '';
  position: absolute;
  bottom: -8px; left: 50%; transform: translateX(-50%);
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid rgba(255,255,255,0.95);
}

/* Tap hints (small labels below objects) */
.tap-label {
  position: absolute;
  font-size: 8px;
  color: rgba(255,220,150,0.8);
  font-weight: 600;
  white-space: nowrap;
  background: rgba(0,0,0,0.5);
  padding: 2px 5px;
  border-radius: 6px;
  pointer-events: none;
  z-index: 8;
}
.tl-cal    { top: 90px; right: 14px; }
.tl-photo  { top: 95px; left: 50%; transform: translateX(-50%); }
.tl-shelf  { bottom: 166px; left: 10px; }
.tl-aid    { bottom: 166px; right: 12px; }

/* Bottom nav */
.bottom-nav {
  background: rgba(20,10,3,0.98);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-around;
  padding: 10px 0 12px;
}
.bn-item {
  display: flex; flex-direction: column; align-items: center;
  gap: 2px; cursor: pointer;
}
.bn-icon { font-size: 20px; }
.bn-label { font-size: 8px; color: #555; font-weight: 500; }
.bn-item.active .bn-label { color: #e8c070; }
.bn-item.active .bn-icon { filter: drop-shadow(0 0 4px rgba(232,192,112,0.5)); }

/* Active dot */
.bn-item.active::after {
  content: '';
  display: block;
  width: 4px; height: 4px;
  background: #e8c070;
  border-radius: 50%;
  margin-top: 2px;
}
</style>
</head>
<body>

<h2>チロルのお部屋</h2>
<p class="sub">部屋のものをタップして機能へ移動するイメージ</p>

<div class="phone">
  <div class="screen">
    <div class="room">
      <div class="room-bg"></div>
      <div class="window-light"></div>
      <div class="wall"></div>
      <div class="baseboard"></div>
      <div class="floor"></div>

      <!-- Window (night) -->
      <div class="window">
        <div class="window-stars">· · · · · · · · · ·</div>
        <div class="moon">🌙</div>
        <div class="window-cross-h"></div>
        <div class="window-cross-v"></div>
        <div class="window-glow"></div>
      </div>

      <!-- Lamp -->
      <div class="lamp">
        <div class="lamp-arm"></div>
        <div class="lamp-head"></div>
        <div class="lamp-light"></div>
      </div>

      <!-- Calendar -->
      <div class="obj-calendar">
        <div class="cal-holes"><div class="cal-hole"></div><div class="cal-hole"></div></div>
        <div class="cal-top">5月</div>
        <div class="cal-grid">
          <div class="cg h">日</div><div class="cg">月</div><div class="cg">火</div><div class="cg">水</div><div class="cg">木</div><div class="cg">金</div><div class="cg s">土</div>
          <div class="cg n"></div><div class="cg n"></div><div class="cg n"></div><div class="cg n"></div><div class="cg n">1</div><div class="cg n">2</div><div class="cg s">3</div>
          <div class="cg h">4</div><div class="cg n">5</div><div class="cg n">6</div><div class="cg n">7</div><div class="cg n">8</div><div class="cg n">9</div><div class="cg s">10</div>
          <div class="cg h">11</div><div class="cg n">12</div><div class="cg n">13</div><div class="cg n today">14</div><div class="cg n">15</div>
        </div>
        <div class="badge">📅 スケジュール</div>
      </div>

      <!-- Photo frame -->
      <div class="obj-photo">
        <div class="frame-outer"><div class="frame-inner">🐕</div></div>
        <div class="badge">📷 WANsta</div>
      </div>

      <!-- Bookshelf -->
      <div class="obj-shelf">
        <div class="books-row">
          <div class="bk bk1"></div>
          <div class="bk bk2"></div>
          <div class="bk bk3"><span>日記</span></div>
          <div class="bk bk4"></div>
          <div class="bk bk5"></div>
          <div class="bk bk6"></div>
        </div>
        <div class="shelf-board"></div>
        <div class="shelf-bracket-l"></div>
        <div class="shelf-bracket-r"></div>
        <div class="badge">📖 ダイ日記</div>
      </div>

      <!-- First aid -->
      <div class="obj-firstaid">
        <div class="aid-box">
          <div class="aid-handle"></div>
          <div class="cross-h"></div>
          <div class="cross-v"></div>
        </div>
        <div class="badge">🩺 様子の記録</div>
      </div>

      <!-- Rug -->
      <div class="rug"></div>

      <!-- Speech bubble -->
      <div class="speech">今日の担当は みずき だぜ 🐾</div>

      <!-- Chirol -->
      <div class="dog">
        <div class="dog-circle">🐕</div>
        <div class="dog-shadow"></div>
      </div>

    </div>

    <!-- Bottom nav -->
    <div class="bottom-nav">
      <div class="bn-item active">
        <span class="bn-icon">🏠</span>
        <span class="bn-label">ホーム</span>
      </div>
      <div class="bn-item">
        <span class="bn-icon">📅</span>
        <span class="bn-label">スケジュール</span>
      </div>
      <div class="bn-item">
        <span class="bn-icon">🐕</span>
        <span class="bn-label">様子</span>
      </div>
      <div class="bn-item">
        <span class="bn-icon">📖</span>
        <span class="bn-label">日記</span>
      </div>
      <div class="bn-item">
        <span class="bn-icon">📷</span>
        <span class="bn-label">WANsta</span>
      </div>
    </div>
  </div>
</div>

</body>
</html>
