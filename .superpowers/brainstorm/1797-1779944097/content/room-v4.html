<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>部屋v4</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #e8e0d8;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 32px 16px 60px;
  font-family: -apple-system, 'Helvetica Neue', sans-serif;
}

.label-top { color: #888; font-size: 12px; margin-bottom: 16px; text-align: center; letter-spacing: 0.5px; }

/* Phone shell */
.phone {
  width: 300px;
  background: #1c1c1e;
  border-radius: 46px;
  padding: 10px;
  box-shadow:
    0 40px 80px rgba(0,0,0,0.25),
    0 0 0 1px rgba(255,255,255,0.08),
    inset 0 0 0 1px rgba(0,0,0,0.5);
}
.screen {
  border-radius: 36px;
  overflow: hidden;
  background: #f5efe6;
}

/* ── ROOM ── */
.room {
  position: relative;
  height: 396px;
  overflow: hidden;
}

/* Wall — warm cream */
.wall {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 148px;
  background: #f0e8dc;
}
/* Subtle horizontal lines like plaster */
.wall::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    180deg,
    transparent 0px, transparent 39px,
    rgba(0,0,0,0.025) 39px, rgba(0,0,0,0.025) 40px
  );
}

/* Shadow where wall meets floor */
.wall-shadow {
  position: absolute;
  bottom: 148px; left: 0; right: 0; height: 16px;
  background: linear-gradient(180deg, rgba(0,0,0,0.06), transparent);
  z-index: 3;
}

/* Floor — warm honey wood */
.floor {
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 152px;
  background: linear-gradient(180deg, #c9a06a 0%, #b8925a 100%);
  perspective: 200px;
}
/* Floor planks */
.floor::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 38px,
    rgba(0,0,0,0.06) 38px, rgba(0,0,0,0.06) 39px
  );
}
.floor::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 24px,
    rgba(0,0,0,0.04) 24px, rgba(0,0,0,0.04) 25px
  );
}
/* Light gloss on floor */
.floor-gloss {
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 152px;
  background: linear-gradient(170deg, rgba(255,255,255,0.12) 0%, transparent 40%);
  pointer-events: none; z-index: 1;
}

/* Baseboard */
.baseboard {
  position: absolute;
  bottom: 148px; left: 0; right: 0; height: 8px;
  background: linear-gradient(180deg, #d4b896, #c4a07a);
  border-top: 1px solid rgba(255,255,255,0.4);
  z-index: 2;
}

/* ── WINDOW ── */
.window {
  position: absolute;
  top: 20px; left: 18px;
  width: 72px; height: 82px;
  z-index: 4;
}
.win-frame {
  width: 100%; height: 100%;
  background: linear-gradient(160deg, #deeeff 0%, #b8d8f8 40%, #d4ecff 100%);
  border: 4px solid #d4b896;
  border-radius: 2px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 0 16px rgba(150,200,255,0.3),
    2px 4px 12px rgba(0,0,0,0.15);
}
.win-frame::before {
  content: ''; position: absolute; top: 0; left: 50%;
  width: 3px; height: 100%; background: #d4b896; transform: translateX(-50%);
}
.win-frame::after {
  content: ''; position: absolute; left: 0; top: 45%;
  width: 100%; height: 3px; background: #d4b896; transform: translateY(-50%);
}
.win-sky { position: absolute; inset: 0; background: linear-gradient(180deg, #b8d4f0 0%, #deeeff 100%); }
.win-cloud {
  position: absolute;
  font-size: 16px; opacity: 0.7;
  animation: cloud-drift 8s ease-in-out infinite;
}
.win-cloud.c1 { top: 4px; left: 4px; }
.win-cloud.c2 { bottom: 8px; right: 2px; font-size: 11px; animation-delay: -3s; }
@keyframes cloud-drift {
  0%,100% { transform: translateX(0); }
  50%      { transform: translateX(3px); }
}
/* Curtains */
.curtain-l, .curtain-r {
  position: absolute;
  top: -2px; width: 14px;
  background: linear-gradient(180deg, #d4a0a0 0%, #c89090 100%);
  opacity: 0.85;
  border-radius: 0 0 6px 6px;
}
.curtain-l { left: -4px; height: 52px; transform: skewX(-3deg); }
.curtain-r { right: -4px; height: 48px; transform: skewX(3deg); }

/* ── CALENDAR ── */
.obj-calendar {
  position: absolute;
  top: 18px; right: 20px;
  width: 62px; height: 72px;
  background: #fff;
  border-radius: 4px 4px 2px 2px;
  box-shadow: 2px 4px 14px rgba(0,0,0,0.18);
  cursor: pointer; z-index: 4;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.obj-calendar:hover { transform: translateY(-2px); box-shadow: 2px 6px 18px rgba(0,0,0,0.22); }
.obj-calendar:active { transform: scale(0.94); }
/* Spiral binding */
.cal-spiral {
  position: absolute; top: -2px; left: 0; right: 0;
  display: flex; justify-content: space-around; padding: 0 6px; z-index: 1;
}
.cal-ring { width: 7px; height: 7px; border: 2px solid #bbb; border-radius: 50%; background: #f0f0f0; }
.cal-month { background: #c17f5a; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-top: 2px; }
.cal-grid { padding: 3px; display: grid; grid-template-columns: repeat(7,1fr); gap: 0.5px; }
.cg { font-size: 5.5px; text-align: center; padding: 1px 0; color: #888; }
.cg.h { color: #e07060; }
.cg.s { color: #6090d0; }
.cg.n { color: #444; }
.cg.t { background: #c17f5a; color: #fff; border-radius: 50%; width: 8px; height: 8px; margin: 0 auto; display: flex; align-items: center; justify-content: center; }

/* ── PHOTO FRAME ── */
.obj-photo {
  position: absolute;
  top: 16px; left: 50%; transform: translateX(-50%);
  width: 78px; height: 70px;
  cursor: pointer; z-index: 4;
  transition: transform 0.2s;
}
.obj-photo:hover { transform: translateX(-50%) translateY(-2px); }
.obj-photo:active { transform: translateX(-50%) scale(0.94); }
.f-outer {
  width: 100%; height: 100%;
  background: #8a6a4a;
  border-radius: 3px;
  padding: 5px 5px 8px;
  box-shadow: 2px 4px 14px rgba(0,0,0,0.2);
  position: relative;
}
.f-outer::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
  border-radius: 3px;
}
.f-inner {
  width: 100%; height: 100%;
  background: #e8d8c0;
  border-radius: 1px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
  font-size: 28px;
}
/* "photo" overlay effect */
.f-inner::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
}

/* ── SHELF ── */
.obj-shelf {
  position: absolute;
  bottom: 175px; left: 12px;
  width: 80px;
  cursor: pointer; z-index: 4;
  transition: transform 0.2s;
}
.obj-shelf:hover { transform: translateY(-1px); }
.obj-shelf:active { transform: scale(0.95); }
.books-row {
  display: flex; align-items: flex-end;
  gap: 1.5px; padding: 0 4px;
}
.bk { border-radius: 2px 2px 0 0; flex-shrink: 0; position: relative; }
/* Muted, cohesive palette — all desaturated */
.bk1 { width:8px;  height:36px; background: #9b8070; }
.bk2 { width:7px;  height:28px; background: #a09080; }
.bk3 { width:12px; height:42px; background: #c4a882; position:relative; }
.bk3::after { content:'日記'; writing-mode:vertical-rl; font-size:6px; color:#fff; font-weight:700; position:absolute; top:6px; left:50%; transform:translateX(-50%); letter-spacing:1px; }
.bk4 { width:7px;  height:30px; background: #8a9090; }
.bk5 { width:9px;  height:34px; background: #a08878; }
.bk6 { width:6px;  height:22px; background: #b0a090; }
.shelf-plank { height: 8px; background: linear-gradient(180deg, #c4a882, #b09070); border-radius: 2px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); margin-top: 0; }

/* ── FIRST AID ── */
.obj-firstaid {
  position: absolute;
  bottom: 176px; right: 16px;
  width: 52px; height: 44px;
  cursor: pointer; z-index: 4;
  transition: transform 0.2s;
}
.obj-firstaid:hover { transform: translateY(-1px); }
.obj-firstaid:active { transform: scale(0.94); }
.aid-body {
  width: 100%; height: 100%;
  background: #f0ebe4;
  border: 1.5px solid #d0c0b0;
  border-radius: 6px;
  box-shadow: 1px 3px 10px rgba(0,0,0,0.15);
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.aid-cross-h { position:absolute; top:50%; left:12px; right:12px; height:7px; background:#c47a6a; border-radius:2px; transform:translateY(-50%); }
.aid-cross-v { position:absolute; left:50%; top:10px; bottom:10px; width:7px; background:#c47a6a; border-radius:2px; transform:translateX(-50%); }
.aid-latch { position:absolute; top:50%; left:50%; width:16px; height:6px; border:1.5px solid #b0a090; border-radius:3px; transform:translate(-50%,-50%); background:#f8f4ee; }

/* ── SMALL TABLE ── */
.table {
  position: absolute;
  bottom: 65px; right: 18px;
  width: 60px; z-index: 3;
}
.tbl-top { height: 9px; background: linear-gradient(180deg, #c4a882, #b09070); border-radius: 3px 3px 0 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.tbl-legs { display: flex; justify-content: space-between; padding: 0 5px; }
.tbl-leg { width: 5px; height: 26px; background: linear-gradient(180deg, #b09070, #9a8060); }
/* Plant on table */
.plant { position: absolute; bottom: 94px; right: 26px; text-align: center; z-index: 4; font-size: 20px; animation: plant-sway 5s ease-in-out infinite; }
@keyframes plant-sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }

/* ── RUG ── */
.rug {
  position: absolute;
  bottom: 62px; left: 50%; transform: translateX(-50%);
  width: 140px; height: 44px;
  background: radial-gradient(ellipse, #c4a882 0%, #b09070 50%, #9a8060 100%);
  border-radius: 50%;
  opacity: 0.5; z-index: 1;
}

/* ── CHIROL ── */
.dog {
  position: absolute;
  bottom: 86px; left: 50%; transform: translateX(-50%);
  z-index: 6; text-align: center; cursor: default;
}
.dog-circle {
  width: 88px; height: 88px;
  border-radius: 50%;
  background: #d4c4b0;
  border: 3px solid rgba(255,255,255,0.5);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.2),
    0 2px 6px rgba(0,0,0,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  animation: dog-breathe 5s ease-in-out infinite;
  overflow: hidden;
}
@keyframes dog-breathe {
  0%,100% { transform: scale(1) rotate(-1deg); }
  50%      { transform: scale(1.02) rotate(1deg); }
}
.dog-shadow {
  width: 64px; height: 12px;
  background: radial-gradient(ellipse, rgba(0,0,0,0.2), transparent);
  border-radius: 50%; margin: 3px auto 0;
}

/* ── SPEECH ── */
.speech {
  position: absolute;
  bottom: 186px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(4px);
  border-radius: 14px;
  padding: 7px 13px;
  font-size: 10px; color: #5a4a3a; font-weight: 500;
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  z-index: 7;
  animation: bubble 5s ease-in-out infinite;
}
@keyframes bubble {
  0%,100% { transform: translateX(-50%) translateY(0); }
  50%      { transform: translateX(-50%) translateY(-3px); }
}
.speech::after {
  content: ''; position: absolute;
  bottom: -7px; left: 50%; transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 7px solid rgba(255,255,255,0.92);
}

/* ── BOTTOM NAV ── */
.nav-wrap {
  background: rgba(248,244,240,0.98);
  border-top: 1px solid rgba(0,0,0,0.06);
  padding: 10px 0 6px;
}
.bottom-nav { display: flex; justify-content: space-around; }
.bn {
  display: flex; flex-direction: column; align-items: center;
  gap: 3px; cursor: pointer; padding: 0 8px;
  opacity: 0.4;
  transition: opacity 0.2s;
}
.bn.active { opacity: 1; }
.bn-i { font-size: 20px; }
.bn-l { font-size: 9px; color: #5a4a3a; font-weight: 500; }
.bn.active .bn-l { color: #c17f5a; font-weight: 700; }
/* Active indicator */
.bn-dot { width: 4px; height: 4px; border-radius: 50%; background: #c17f5a; margin: 0 auto; }

/* Home indicator */
.home-ind { background: rgba(248,244,240,0.98); display: flex; align-items: center; justify-content: center; padding: 3px 0 9px; }
.home-bar { width: 90px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 3px; }

/* Hover tooltip */
.tooltip {
  position: absolute;
  pointer-events: none;
  background: rgba(60,40,20,0.85);
  color: #fff;
  font-size: 9px; font-weight: 600;
  padding: 3px 7px; border-radius: 6px;
  white-space: nowrap; z-index: 20;
  opacity: 0; transition: opacity 0.2s;
}
.obj-calendar:hover ~ #tt-cal,
.obj-photo:hover ~ #tt-photo,
.obj-shelf:hover ~ #tt-shelf,
.obj-firstaid:hover ~ #tt-aid { opacity: 1; }
#tt-cal   { top: 96px; right: 16px; }
#tt-photo { top: 93px; left: 50%; transform: translateX(-50%); }
#tt-shelf { bottom: 156px; left: 10px; }
#tt-aid   { bottom: 156px; right: 10px; }
</style>
</head>
<body>

<div class="label-top">チロルのお部屋 — タップして移動</div>

<div class="phone">
  <div class="screen">
    <div class="room">
      <!-- Structure -->
      <div class="wall"></div>
      <div class="wall-shadow"></div>
      <div class="baseboard"></div>
      <div class="floor"><div class="floor-gloss"></div></div>

      <!-- Window with curtains -->
      <div class="window">
        <div class="curtain-l"></div>
        <div class="curtain-r"></div>
        <div class="win-frame">
          <div class="win-sky"></div>
          <div class="win-cloud c1">☁</div>
          <div class="win-cloud c2">☁</div>
        </div>
      </div>

      <!-- Wall objects -->
      <div class="obj-calendar">
        <div class="cal-spiral"><div class="cal-ring"></div><div class="cal-ring"></div><div class="cal-ring"></div></div>
        <div class="cal-month">MAY</div>
        <div class="cal-grid">
          <div class="cg h">日</div><div class="cg">月</div><div class="cg">火</div><div class="cg">水</div><div class="cg">木</div><div class="cg">金</div><div class="cg s">土</div>
          <div class="cg"></div><div class="cg"></div><div class="cg"></div><div class="cg"></div><div class="cg n">1</div><div class="cg n">2</div><div class="cg s">3</div>
          <div class="cg h">4</div><div class="cg n">5</div><div class="cg n">6</div><div class="cg n">7</div><div class="cg n">8</div><div class="cg n">9</div><div class="cg s">10</div>
          <div class="cg h">11</div><div class="cg n">12</div><div class="cg n">13</div><div class="cg t">14</div><div class="cg n">15</div>
        </div>
      </div>

      <div class="obj-photo">
        <div class="f-outer"><div class="f-inner">🐕</div></div>
      </div>

      <!-- Floor objects -->
      <div class="obj-shelf">
        <div class="books-row">
          <div class="bk bk1"></div>
          <div class="bk bk2"></div>
          <div class="bk bk3"></div>
          <div class="bk bk4"></div>
          <div class="bk bk5"></div>
          <div class="bk bk6"></div>
        </div>
        <div class="shelf-plank"></div>
      </div>

      <div class="obj-firstaid">
        <div class="aid-body">
          <div class="aid-cross-h"></div>
          <div class="aid-cross-v"></div>
        </div>
      </div>

      <div class="table">
        <div class="tbl-top"></div>
        <div class="tbl-legs"><div class="tbl-leg"></div><div class="tbl-leg"></div></div>
      </div>
      <div class="plant">🪴</div>

      <div class="rug"></div>

      <!-- Tooltips (shown on hover) -->
      <div class="tooltip" id="tt-cal">📅 スケジュール</div>
      <div class="tooltip" id="tt-photo">📷 WANsta</div>
      <div class="tooltip" id="tt-shelf">📖 ダイ日記</div>
      <div class="tooltip" id="tt-aid">🩺 だいずの様子</div>

      <!-- Chirol + bubble -->
      <div class="speech">今日の担当は みずき 🌿</div>
      <div class="dog">
        <div class="dog-circle">🐕</div>
        <div class="dog-shadow"></div>
      </div>
    </div>

    <div class="nav-wrap">
      <div class="bottom-nav">
        <div class="bn active"><span class="bn-i">🏠</span><span class="bn-l">ホーム</span><div class="bn-dot"></div></div>
        <div class="bn"><span class="bn-i">📅</span><span class="bn-l">予定</span></div>
        <div class="bn"><span class="bn-i">🐕</span><span class="bn-l">様子</span></div>
        <div class="bn"><span class="bn-i">📖</span><span class="bn-l">日記</span></div>
        <div class="bn"><span class="bn-i">📷</span><span class="bn-l">写真</span></div>
      </div>
    </div>
    <div class="home-ind"><div class="home-bar"></div></div>
  </div>
</div>

</body>
</html>
