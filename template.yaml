AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Family Schedule LINE Bot with Chirol Character (LIFF)

# 注意: sam deploy は CloudFormation ResourceExistenceCheck エラーで失敗するため使用不可。
# このファイルは参考用。実際のデプロイは GitHub Actions (push to main) で自動実行。
# 手動デプロイ: scripts/deploy.sh を参照。
#
# 実際の Lambda 関数名・Handler は以下の通り（AWS コンソールと一致）:
#   family-schedule-webhook-kame   / handlers/webhook.handler
#   family-schedule-submit-kame    / handlers/schedule-submit.handler
#   family-schedule-get-kame       / handlers/schedule-get.handler
#   family-schedule-week-get-kame  / handlers/schedule-week-get.handler
#   family-schedule-weekly-reminder-kame / handlers/weekly-reminder.handler
#   chirol-hitokoto-kame           / handlers/chirol-hitokoto.handler
#   chirol-image-kame              / handlers/chirol-image.handler
#   post-get-kame                  / handlers/post-get.handler
#   post-save-kame                 / handlers/post-save.handler
#   wannade-save-kame              / handlers/wannade-save.handler
#
# IAM ロール:
#   schedule 系: 各 CloudFormation 管理ロール（SAM が自動生成）
#   dog-record-lambda-role-kame: chirol-*/post-*/wannade-* が使用
#     インラインポリシー: dog-record-policy / FamilyPostsDynamoDBPolicy /
#       LineSecretsPolicy / SystemConfigDynamoDBPolicy / WannadeRankingDynamoDBPolicy

Parameters:
  LineSecretName:
    Type: String
    Default: line/credentials-kame
    Description: Secrets Manager secret name for LINE credentials

  FamilyUserIds:
    Type: String
    Description: Comma-separated list of family member userIds
    Default: ""

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        LINE_SECRET_NAME: !Ref LineSecretName
        TABLE_SCHEDULE_INPUTS: ScheduleInputs-kame
        TABLE_SYSTEM_CONFIG: SystemConfig-kame
        TABLE_CHIROL_DATA: ChirolData-kame
        TABLE_FAMILY_POSTS: FamilyPosts-kame
        TABLE_WANNADE_RANKING: WannadeRanking-kame
        CHIROL_IMAGE_BUCKET: family-schedule-web-kame-982312822872
        FAMILY_USER_IDS: !Ref FamilyUserIds

Resources:

  # API Gateway
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization,X-Line-Signature'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"

  # ============================================================
  # スケジュール系 Lambda Functions
  # 実際の関数名: family-schedule-*-kame (SAM が付けたプレフィックス)
  # ============================================================

  WebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: family-schedule-webhook-kame
      CodeUri: ./
      Handler: handlers/webhook.handler
      Events:
        WebhookApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /webhook
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: SystemConfig-kame
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${LineSecretName}*'

  ScheduleSubmitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: family-schedule-submit-kame
      CodeUri: ./
      Handler: handlers/schedule-submit.handler
      Events:
        SubmitApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /schedule/submit
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ScheduleInputs-kame
        - DynamoDBReadPolicy:
            TableName: SystemConfig-kame
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${LineSecretName}*'

  ScheduleGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: family-schedule-get-kame
      CodeUri: ./
      Handler: handlers/schedule-get.handler
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /schedule/{weekId}
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: ScheduleInputs-kame
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${LineSecretName}*'

  ScheduleWeekGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: family-schedule-week-get-kame
      CodeUri: ./
      Handler: handlers/schedule-week-get.handler
      Events:
        GetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /schedule/week/{weekId}
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: ScheduleInputs-kame

  # ============================================================
  # 週次処理系 Lambda Functions
  # EventBridge Schedule は AWS CLI で別途設定済み
  # ============================================================

  WeeklyReminderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: family-schedule-weekly-reminder-kame
      CodeUri: ./
      Handler: handlers/weekly-reminder.handler
      # EventBridge: cron(0 1 ? * FRI *) = 金曜 10:00 JST
      DeadLetterQueue:
        Type: SQS
        TargetArn: !GetAtt DLQueue.Arn
      Policies:
        - DynamoDBReadPolicy:
            TableName: ScheduleInputs-kame
        - DynamoDBReadPolicy:
            TableName: SystemConfig-kame
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${LineSecretName}*'

  # ============================================================
  # チロルキャラクター系 Lambda Functions
  # IAM ロール: dog-record-lambda-role-kame（手動管理）
  # ============================================================

  ChirolHitokotoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chirol-hitokoto-kame
      CodeUri: ./
      Handler: handlers/chirol-hitokoto.handler
      Events:
        HitokotoGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/hitokoto
            Method: GET
        HitokotoPostApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/hitokoto
            Method: POST
        HitokotoDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/hitokoto
            Method: DELETE
      # 実際の IAM: dog-record-lambda-role-kame
      # dog-record-policy: ChirolData-kame への CRUD + UpdateItem
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ChirolData-kame

  ChirolImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: chirol-image-kame
      CodeUri: ./
      Handler: handlers/chirol-image.handler
      Events:
        ImageGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/images
            Method: GET
        ImageUploadUrlApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/upload-url
            Method: GET
        ImagePostApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/images
            Method: POST
        ImageDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /chirol/images
            Method: DELETE
      # 実際の IAM: dog-record-lambda-role-kame
      # dog-record-policy: ChirolData-kame + S3 family-schedule-web-kame-*
      Policies:
        - DynamoDBCrudPolicy:
            TableName: ChirolData-kame
        - S3CrudPolicy:
            BucketName: family-schedule-web-kame-982312822872

  # ============================================================
  # つぶやき・ダイ日記・様子系 Lambda Functions
  # IAM ロール: dog-record-lambda-role-kame（手動管理）
  # ============================================================

  PostGetFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: post-get-kame
      CodeUri: ./
      Handler: handlers/post-get.handler
      Events:
        PostsGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /posts
            Method: GET
      # 実際の IAM: dog-record-lambda-role-kame / FamilyPostsDynamoDBPolicy
      Policies:
        - DynamoDBReadPolicy:
            TableName: FamilyPosts-kame

  PostSaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: post-save-kame
      CodeUri: ./
      Handler: handlers/post-save.handler
      Events:
        PostCreateApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /posts
            Method: POST
        PostUpdateApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /posts/{postId}
            Method: PUT
        PostDeleteApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /posts/{postId}
            Method: DELETE
        PostReactionApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /posts/{postId}/reaction
            Method: POST
        PostCommentApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /posts/{postId}/comment
            Method: POST
      # 実際の IAM: dog-record-lambda-role-kame
      # FamilyPostsDynamoDBPolicy / LineSecretsPolicy / SystemConfigDynamoDBPolicy
      Policies:
        - DynamoDBCrudPolicy:
            TableName: FamilyPosts-kame
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${LineSecretName}*'
            - Effect: Allow
              Action:
                - dynamodb:GetItem
              Resource: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/SystemConfig-kame'

  WannadeSaveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: wannade-save-kame
      CodeUri: ./
      Handler: handlers/wannade-save.handler
      Events:
        WannadeGetApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /wannade
            Method: GET
        WannadePostApi:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /wannade
            Method: POST
      # 実際の IAM: dog-record-lambda-role-kame / WannadeRankingDynamoDBPolicy
      Policies:
        - DynamoDBCrudPolicy:
            TableName: WannadeRanking-kame

  # ============================================================
  # インフラ
  # ============================================================

  DLQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: family-schedule-dlq-kame
      MessageRetentionPeriod: 1209600  # 14 days

Outputs:
  ApiGatewayUrl:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod'

  WebhookUrl:
    Description: LINE Webhook URL
    Value: !Sub 'https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/prod/webhook'
